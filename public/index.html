<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auto-CM - Sora2自動広告生成</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 20px;
      padding: 40px;
      max-width: 600px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    h1 { text-align: center; margin-bottom: 10px; font-size: 2em; }
    .subtitle { text-align: center; color: #666; margin-bottom: 30px; }
    .upload-area {
      border: 3px dashed #ddd;
      border-radius: 15px;
      padding: 40px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
      margin-bottom: 20px;
    }
    .upload-area:hover { border-color: #667eea; background: #f8f9ff; }
    .upload-area.dragover { border-color: #667eea; background: #f0f2ff; }
    .upload-area img { max-width: 100%; max-height: 200px; border-radius: 10px; }
    #file-input { display: none; }
    .btn {
      width: 100%;
      padding: 15px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s;
    }
    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(102,126,234,0.4); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .progress { margin-top: 20px; padding: 20px; background: #f8f9fa; border-radius: 10px; display: none; }
    .progress.show { display: block; }
    .progress-item { display: flex; align-items: center; padding: 8px 0; border-bottom: 1px solid #eee; }
    .progress-item:last-child { border-bottom: none; }
    .progress-icon { margin-right: 10px; font-size: 18px; }
    .result { margin-top: 20px; padding: 20px; background: #d4edda; border-radius: 10px; display: none; }
    .result.show { display: block; }
    .result.error { background: #f8d7da; }
    .result h3 { margin-bottom: 10px; }
    .result a { color: #667eea; }
    .mock-badge { background: #ffc107; color: #000; padding: 3px 8px; border-radius: 5px; font-size: 12px; margin-left: 10px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎬 Auto-CM</h1>
    <p class="subtitle">商品画像から12秒広告動画を自動生成</p>

    <div class="upload-area" id="upload-area">
      <div id="upload-prompt">
        <p style="font-size: 48px; margin-bottom: 10px;">📸</p>
        <p>商品画像をドロップ または クリックして選択</p>
        <p style="color: #999; font-size: 12px; margin-top: 10px;">PNG, JPG (最大10MB)</p>
      </div>
      <img id="preview" style="display: none;">
    </div>
    <input type="file" id="file-input" accept="image/png,image/jpeg">

    <button class="btn btn-primary" id="generate-btn" disabled>🚀 広告動画を生成</button>

    <div class="progress" id="progress">
      <div class="progress-item" data-stage="load"><span class="progress-icon">⏳</span><span>画像読み込み中...</span></div>
      <div class="progress-item" data-stage="analyze"><span class="progress-icon">⏳</span><span>商品分析中...</span></div>
      <div class="progress-item" data-stage="script"><span class="progress-icon">⏳</span><span>スクリプト生成中...</span></div>
      <div class="progress-item" data-stage="process"><span class="progress-icon">⏳</span><span>画像処理中...</span></div>
      <div class="progress-item" data-stage="video"><span class="progress-icon">⏳</span><span>動画生成中...</span></div>
    </div>

    <div class="result" id="result">
      <h3>✅ 生成完了！</h3>
      <div id="result-content"></div>
    </div>
  </div>

  <script>
    const uploadArea = document.getElementById('upload-area');
    const fileInput = document.getElementById('file-input');
    const preview = document.getElementById('preview');
    const uploadPrompt = document.getElementById('upload-prompt');
    const generateBtn = document.getElementById('generate-btn');
    const progress = document.getElementById('progress');
    const result = document.getElementById('result');
    const resultContent = document.getElementById('result-content');

    let selectedFile = null;

    uploadArea.addEventListener('click', () => fileInput.click());
    uploadArea.addEventListener('dragover', (e) => { e.preventDefault(); uploadArea.classList.add('dragover'); });
    uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
    uploadArea.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadArea.classList.remove('dragover');
      if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
    });
    fileInput.addEventListener('change', (e) => { if (e.target.files[0]) handleFile(e.target.files[0]); });

    function handleFile(file) {
      if (!file.type.match(/image\/(png|jpeg|jpg)/)) {
        alert('PNG または JPG 画像を選択してください');
        return;
      }
      selectedFile = file;
      const reader = new FileReader();
      reader.onload = (e) => {
        preview.src = e.target.result;
        preview.style.display = 'block';
        uploadPrompt.style.display = 'none';
        generateBtn.disabled = false;
      };
      reader.readAsDataURL(file);
    }

    generateBtn.addEventListener('click', async () => {
      if (!selectedFile) return;

      generateBtn.disabled = true;
      progress.classList.add('show');
      result.classList.remove('show');

      document.querySelectorAll('.progress-item').forEach(item => {
        item.querySelector('.progress-icon').textContent = '⏳';
      });

      const formData = new FormData();
      formData.append('image', selectedFile);

      try {
        const response = await fetch('/api/generate', { method: 'POST', body: formData });
        const data = await response.json();

        if (data.success) {
          document.querySelectorAll('.progress-item').forEach(item => {
            item.querySelector('.progress-icon').textContent = '✅';
          });

          result.classList.remove('error');
          result.classList.add('show');

          const meta = data.metadata || {};
          const productType = meta.productAnalysis?.productType || 'N/A';
          const personaName = meta.persona?.name || 'N/A';
          const personaAge = meta.persona?.age || '';
          const sceneCount = meta.script?.scenes?.length || 0;
          const procTime = ((meta.processingTime || 0) / 1000).toFixed(1);
          const videoUrl = data.videoUrl || '';
          const isMock = videoUrl.includes('mock');

          resultContent.innerHTML =
            '<p><strong>商品タイプ:</strong> ' + productType + '</p>' +
            '<p><strong>ペルソナ:</strong> ' + personaName + ', ' + personaAge + '歳</p>' +
            '<p><strong>シーン数:</strong> ' + sceneCount + '</p>' +
            '<p><strong>処理時間:</strong> ' + procTime + '秒</p>' +
            '<p><strong>動画URL:</strong> <a href="' + videoUrl + '" target="_blank">' + videoUrl + '</a>' +
            (isMock ? ' <span class="mock-badge">MOCK</span>' : '') + '</p>';
        } else {
          throw new Error(data.error || '生成に失敗しました');
        }
      } catch (error) {
        result.classList.add('error');
        result.classList.add('show');
        resultContent.innerHTML = '<p>❌ エラー: ' + error.message + '</p>';
      } finally {
        generateBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
