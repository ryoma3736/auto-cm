<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auto-CM - Sora2自動広告生成</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 20px;
      padding: 40px;
      max-width: 600px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    h1 { text-align: center; margin-bottom: 10px; font-size: 2em; }
    .subtitle { text-align: center; color: #666; margin-bottom: 30px; }
    .upload-area {
      border: 3px dashed #ddd;
      border-radius: 15px;
      padding: 40px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
      margin-bottom: 20px;
    }
    .upload-area:hover { border-color: #667eea; background: #f8f9ff; }
    .upload-area.dragover { border-color: #667eea; background: #f0f2ff; }
    .upload-area img { max-width: 100%; max-height: 200px; border-radius: 10px; }
    #file-input { display: none; }

    /* Settings Section */
    .settings {
      display: flex;
      gap: 15px;
      margin-bottom: 20px;
    }
    .setting-group {
      flex: 1;
    }
    .setting-group label {
      display: block;
      font-size: 12px;
      color: #666;
      margin-bottom: 5px;
      font-weight: 600;
    }
    .setting-group select {
      width: 100%;
      padding: 10px 12px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      background: white;
      cursor: pointer;
      transition: border-color 0.3s;
    }
    .setting-group select:hover {
      border-color: #667eea;
    }
    .setting-group select:focus {
      outline: none;
      border-color: #667eea;
    }

    /* Custom Prompt */
    .custom-prompt-group {
      margin-bottom: 20px;
    }
    .custom-prompt-group label {
      display: block;
      font-size: 12px;
      color: #666;
      margin-bottom: 5px;
      font-weight: 600;
    }
    .custom-prompt-group textarea {
      width: 100%;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      resize: vertical;
      min-height: 80px;
      transition: border-color 0.3s;
    }
    .custom-prompt-group textarea:hover {
      border-color: #667eea;
    }
    .custom-prompt-group textarea:focus {
      outline: none;
      border-color: #667eea;
    }
    .custom-prompt-group .hint {
      font-size: 11px;
      color: #999;
      margin-top: 5px;
    }

    /* Mode Selection */
    .mode-selection {
      margin-bottom: 20px;
      padding: 15px;
      background: #f8f9fa;
      border-radius: 10px;
    }
    .mode-selection-label {
      display: block;
      font-size: 12px;
      color: #666;
      margin-bottom: 10px;
      font-weight: 600;
    }
    .mode-options {
      display: flex;
      gap: 10px;
    }
    .mode-option {
      flex: 1;
      padding: 15px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s;
      background: white;
    }
    .mode-option:hover {
      border-color: #667eea;
    }
    .mode-option.selected {
      border-color: #667eea;
      background: linear-gradient(135deg, rgba(102,126,234,0.1) 0%, rgba(118,75,162,0.1) 100%);
    }
    .mode-option input {
      display: none;
    }
    .mode-option-title {
      font-weight: 600;
      margin-bottom: 5px;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .mode-option-desc {
      font-size: 12px;
      color: #666;
    }
    .mode-badge {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 4px;
      font-weight: normal;
    }
    .mode-badge-v1 {
      background: #e3f2fd;
      color: #1976d2;
    }
    .mode-badge-v2 {
      background: #fff3e0;
      color: #f57c00;
    }

    /* V2 Product Details Form */
    .product-details {
      display: none;
      margin-bottom: 20px;
      padding: 15px;
      background: #fff3e0;
      border-radius: 10px;
      border: 2px solid #ffcc80;
    }
    .product-details.show {
      display: block;
    }
    .product-details-title {
      font-weight: 600;
      margin-bottom: 10px;
      color: #f57c00;
    }
    .product-field {
      margin-bottom: 12px;
    }
    .product-field label {
      display: block;
      font-size: 12px;
      color: #666;
      margin-bottom: 4px;
      font-weight: 600;
    }
    .product-field input,
    .product-field textarea {
      width: 100%;
      padding: 10px;
      border: 2px solid #e0e0e0;
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
      transition: border-color 0.3s;
    }
    .product-field input:focus,
    .product-field textarea:focus {
      outline: none;
      border-color: #f57c00;
    }
    .product-field textarea {
      resize: vertical;
      min-height: 60px;
    }
    .product-field .required {
      color: #e53935;
    }

    .btn {
      width: 100%;
      padding: 15px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s;
    }
    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(102,126,234,0.4); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .progress { margin-top: 20px; padding: 20px; background: #f8f9fa; border-radius: 10px; display: none; }
    .progress.show { display: block; }
    .progress-item { display: flex; align-items: center; padding: 8px 0; border-bottom: 1px solid #eee; }
    .progress-item:last-child { border-bottom: none; }
    .progress-icon { margin-right: 10px; font-size: 18px; }
    .result { margin-top: 20px; padding: 20px; background: #d4edda; border-radius: 10px; display: none; }
    .result.show { display: block; }
    .result.error { background: #f8d7da; }
    .result h3 { margin-bottom: 10px; }
    .result a { color: #667eea; word-break: break-all; }
    .result p { margin-bottom: 8px; }
    .mock-badge { background: #ffc107; color: #000; padding: 3px 8px; border-radius: 5px; font-size: 12px; margin-left: 10px; }

    /* Video URL styling */
    .video-url-container {
      background: #f8f9fa;
      padding: 10px;
      border-radius: 8px;
      margin-top: 10px;
    }
    .video-url-container a {
      display: block;
      font-size: 13px;
      word-break: break-all;
    }
    .video-actions {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }
    .video-actions button {
      flex: 1;
      padding: 8px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
    }
    .btn-copy {
      background: #667eea;
      color: white;
    }
    .btn-open {
      background: #28a745;
      color: white;
    }
    .btn-copy:hover, .btn-open:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎬 Auto-CM</h1>
    <p class="subtitle">商品画像から広告動画を自動生成</p>

    <div class="upload-area" id="upload-area">
      <div id="upload-prompt">
        <p style="font-size: 48px; margin-bottom: 10px;">📸</p>
        <p>商品画像をドロップ または クリックして選択</p>
        <p style="color: #999; font-size: 12px; margin-top: 10px;">PNG, JPG (最大10MB)</p>
      </div>
      <img id="preview" style="display: none;">
    </div>
    <input type="file" id="file-input" accept="image/png,image/jpeg">

    <!-- Mode Selection -->
    <div class="mode-selection">
      <label class="mode-selection-label">🎯 生成モード選択</label>
      <div class="mode-options">
        <label class="mode-option selected" id="mode-v1">
          <input type="radio" name="mode" value="v1" checked>
          <div class="mode-option-title">
            V1 <span class="mode-badge mode-badge-v1">自由度高</span>
          </div>
          <div class="mode-option-desc">
            抽象的なプロンプトでOK。「こんなCMがいい」程度の指示で動画を生成します。
          </div>
        </label>
        <label class="mode-option" id="mode-v2">
          <input type="radio" name="mode" value="v2">
          <div class="mode-option-title">
            V2 <span class="mode-badge mode-badge-v2">具体寄せ</span>
          </div>
          <div class="mode-option-desc">
            商品詳細を入力して、より正確な広告を生成。画像だけでは伝わらない情報を補完します。
          </div>
        </label>
      </div>
    </div>

    <!-- V2 Product Details (hidden by default) -->
    <div class="product-details" id="product-details">
      <div class="product-details-title">📦 商品詳細情報（V2モード）</div>
      <div class="product-field">
        <label>商品名 <span class="required">*</span></label>
        <input type="text" id="product-name" placeholder="例: モイスチャーヘアオイル">
      </div>
      <div class="product-field">
        <label>商品の特徴・効果</label>
        <textarea id="product-features" placeholder="例: 髪のダメージを補修し、サラサラの仕上がりに。天然オイル配合で髪に優しい。"></textarea>
      </div>
      <div class="product-field">
        <label>ターゲット層</label>
        <input type="text" id="target-audience" placeholder="例: 20-30代女性、髪のパサつきが気になる方">
      </div>
      <div class="product-field">
        <label>訴求ポイント</label>
        <textarea id="selling-points" placeholder="例: 1本で髪がツヤツヤに！朝のスタイリングが楽になる。"></textarea>
      </div>
    </div>

    <!-- Settings -->
    <div class="settings">
      <div class="setting-group">
        <label>⏱️ 動画時間</label>
        <select id="duration-select">
          <option value="4">4秒</option>
          <option value="8">8秒</option>
          <option value="12" selected>12秒</option>
        </select>
      </div>
      <div class="setting-group">
        <label>🌐 言語</label>
        <select id="language-select">
          <option value="ja" selected>日本語</option>
          <option value="en">English</option>
          <option value="zh">中文</option>
        </select>
      </div>
    </div>

    <!-- Custom Prompt -->
    <div class="custom-prompt-group">
      <label>✨ カスタムプロンプト（任意）</label>
      <textarea id="custom-prompt" placeholder="例: 商品を手に持って笑顔で紹介する感じにして&#10;例: 高級感のある雰囲気で、背景はシンプルに&#10;例: かわいい感じで、ピンク系の色調で"></textarea>
      <p class="hint">動画の雰囲気や演出の指示を自由に入力できます。空欄の場合は自動で最適化されます。</p>
    </div>

    <button class="btn btn-primary" id="generate-btn" disabled>🚀 広告動画を生成</button>

    <div class="progress" id="progress">
      <div class="progress-item" data-stage="load"><span class="progress-icon">⏳</span><span>画像読み込み中...</span></div>
      <div class="progress-item" data-stage="analyze"><span class="progress-icon">⏳</span><span>商品分析中...</span></div>
      <div class="progress-item" data-stage="script"><span class="progress-icon">⏳</span><span>スクリプト生成中...</span></div>
      <div class="progress-item" data-stage="process"><span class="progress-icon">⏳</span><span>画像処理中...</span></div>
      <div class="progress-item" data-stage="video"><span class="progress-icon">⏳</span><span>動画生成中...</span></div>
    </div>

    <div class="result" id="result">
      <h3>✅ 生成完了！</h3>
      <div id="result-content"></div>
    </div>
  </div>

  <script>
    const uploadArea = document.getElementById('upload-area');
    const fileInput = document.getElementById('file-input');
    const preview = document.getElementById('preview');
    const uploadPrompt = document.getElementById('upload-prompt');
    const generateBtn = document.getElementById('generate-btn');
    const progress = document.getElementById('progress');
    const result = document.getElementById('result');
    const resultContent = document.getElementById('result-content');
    const durationSelect = document.getElementById('duration-select');
    const languageSelect = document.getElementById('language-select');
    const customPromptInput = document.getElementById('custom-prompt');

    // Mode selection elements
    const modeV1 = document.getElementById('mode-v1');
    const modeV2 = document.getElementById('mode-v2');
    const productDetails = document.getElementById('product-details');
    const productNameInput = document.getElementById('product-name');
    const productFeaturesInput = document.getElementById('product-features');
    const targetAudienceInput = document.getElementById('target-audience');
    const sellingPointsInput = document.getElementById('selling-points');

    let selectedFile = null;
    let selectedMode = 'v1';

    // Mode selection logic
    modeV1.addEventListener('click', () => {
      selectedMode = 'v1';
      modeV1.classList.add('selected');
      modeV2.classList.remove('selected');
      productDetails.classList.remove('show');
    });

    modeV2.addEventListener('click', () => {
      selectedMode = 'v2';
      modeV2.classList.add('selected');
      modeV1.classList.remove('selected');
      productDetails.classList.add('show');
    });

    uploadArea.addEventListener('click', () => fileInput.click());
    uploadArea.addEventListener('dragover', (e) => { e.preventDefault(); uploadArea.classList.add('dragover'); });
    uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
    uploadArea.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadArea.classList.remove('dragover');
      if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
    });
    fileInput.addEventListener('change', (e) => { if (e.target.files[0]) handleFile(e.target.files[0]); });

    function handleFile(file) {
      if (!file.type.match(/image\/(png|jpeg|jpg)/)) {
        alert('PNG または JPG 画像を選択してください');
        return;
      }
      selectedFile = file;
      const reader = new FileReader();
      reader.onload = (e) => {
        preview.src = e.target.result;
        preview.style.display = 'block';
        uploadPrompt.style.display = 'none';
        generateBtn.disabled = false;
      };
      reader.readAsDataURL(file);
    }

    function copyToClipboard(text) {
      navigator.clipboard.writeText(text).then(() => {
        alert('URLをコピーしました！');
      });
    }

    generateBtn.addEventListener('click', async () => {
      if (!selectedFile) return;

      generateBtn.disabled = true;
      progress.classList.add('show');
      result.classList.remove('show');

      document.querySelectorAll('.progress-item').forEach(item => {
        item.querySelector('.progress-icon').textContent = '⏳';
      });

      // V2 mode validation
      if (selectedMode === 'v2') {
        const productName = productNameInput.value.trim();
        if (!productName) {
          alert('V2モードでは商品名の入力が必須です');
          generateBtn.disabled = false;
          progress.classList.remove('show');
          return;
        }
      }

      const formData = new FormData();
      formData.append('image', selectedFile);
      formData.append('duration', durationSelect.value);
      formData.append('language', languageSelect.value);
      formData.append('mode', selectedMode);

      // Add custom prompt
      const customPromptValue = customPromptInput.value.trim();
      if (customPromptValue) {
        formData.append('customPrompt', customPromptValue);
      }

      // Add V2 product details
      if (selectedMode === 'v2') {
        formData.append('productName', productNameInput.value.trim());
        formData.append('productFeatures', productFeaturesInput.value.trim());
        formData.append('targetAudience', targetAudienceInput.value.trim());
        formData.append('sellingPoints', sellingPointsInput.value.trim());
      }

      try {
        const response = await fetch('/api/generate', { method: 'POST', body: formData });
        const data = await response.json();

        if (data.success) {
          document.querySelectorAll('.progress-item').forEach(item => {
            item.querySelector('.progress-icon').textContent = '✅';
          });

          result.classList.remove('error');
          result.classList.add('show');

          const meta = data.metadata || {};
          const productType = meta.productAnalysis?.productType || 'N/A';
          const personaName = meta.persona?.name || 'N/A';
          const personaAge = meta.persona?.age || '';
          const sceneCount = meta.script?.scenes?.length || 0;
          const procTime = ((meta.processingTime || 0) / 1000).toFixed(1);
          const videoUrl = data.videoUrl || '';
          const isMock = videoUrl.includes('mock');
          const duration = durationSelect.value;
          const langLabel = languageSelect.options[languageSelect.selectedIndex].text;

          // Get narration from scenes
          const scenes = meta.script?.scenes || [];
          const narrationHtml = scenes.map((scene, i) =>
            `<div style="margin: 5px 0; padding: 8px; background: #e8f5e9; border-radius: 5px;">
              <strong>シーン${i + 1}:</strong> ${scene.narration || 'N/A'}
            </div>`
          ).join('');

          resultContent.innerHTML = `
            <p><strong>商品タイプ:</strong> ${productType}</p>
            <p><strong>ペルソナ:</strong> ${personaName}, ${personaAge}歳</p>
            <p><strong>シーン数:</strong> ${sceneCount}</p>
            <p><strong>動画時間:</strong> ${duration}秒</p>
            <p><strong>言語:</strong> ${langLabel}</p>
            <p><strong>処理時間:</strong> ${procTime}秒</p>
            <div style="margin: 10px 0;">
              <strong>📝 ナレーション:</strong>
              ${narrationHtml}
            </div>
            <div class="video-url-container">
              <strong>動画URL:</strong>${isMock ? ' <span class="mock-badge">MOCK</span>' : ''}
              <a href="${videoUrl}" target="_blank">${videoUrl}</a>
              <div class="video-actions">
                <button class="btn-copy" onclick="copyToClipboard('${videoUrl}')">📋 URLをコピー</button>
                <button class="btn-open" onclick="window.open('${videoUrl}', '_blank')">🎥 動画を開く</button>
              </div>
            </div>
          `;
        } else {
          throw new Error(data.error || '生成に失敗しました');
        }
      } catch (error) {
        result.classList.add('error');
        result.classList.add('show');

        // User-friendly error messages
        let errorMessage = error.message;
        if (errorMessage.includes('flagged as sensitive') || errorMessage.includes('E005')) {
          errorMessage = 'コンテンツモデレーションにより拒否されました。別の画像またはプロンプトをお試しください。';
        } else if (errorMessage.includes('timeout')) {
          errorMessage = '動画生成がタイムアウトしました。もう一度お試しください。';
        } else if (errorMessage.includes('Empty prompt')) {
          errorMessage = 'スクリプト生成に失敗しました。もう一度お試しください。';
        }

        resultContent.innerHTML = '<p>❌ エラー: ' + errorMessage + '</p><p style="color:#666;font-size:12px;">詳細: ' + error.message + '</p>';
      } finally {
        generateBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
